name: Build TWRP for Xiaomi 14T Pro (rothko)

on:
  workflow_dispatch:
    inputs:
      twrp_branch:
        description: 'TWRP manifest branch'
        required: false
        default: 'twrp-14.1'
      sync_depth:
        description: 'Shallow clone depth (0 for full)'
        required: false
        default: '1'

env:
  MANIFEST_URL: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  MANIFEST_BRANCH: ${{ github.event.inputs.twrp_branch || 'twrp-14.1' }}
  DEVICE_TREE_URL: https://github.com/JonesqPacMan/android_device_xiaomi_rothko_twrp.git
  DEVICE_TREE_BRANCH: twrp-14.1_a16
  DEVICE: rothko
  SYNC_DEPTH: ${{ github.event.inputs.sync_depth || '1' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Free up disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules
          sudo apt-get clean
          echo "=== After cleanup ==="
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git git-lfs gnupg \
            gperf imagemagick lib32readline-dev lib32z1-dev \
            libelf-dev liblz4-tool libncurses5 libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
            lz4 pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev libwxgtk3.0-gtk3-dev \
            repo python3 python-is-python3 wget \
            openjdk-17-jdk unzip
          sudo apt-get clean
          echo "=== Disk space after deps ==="
          df -h /

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-twrp-rothko-${{ github.run_number }}
          restore-keys: |
            ccache-twrp-rothko-

      - name: Configure ccache
        run: |
          ccache -M 10G
          ccache -o compression=true
          ccache -o compression_level=6
          ccache -z

      - name: Set up repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync TWRP source
        run: |
          mkdir -p ~/twrp
          cd ~/twrp

          echo "=== Initializing repo ==="
          repo init -u $MANIFEST_URL \
            -b $MANIFEST_BRANCH \
            --depth=$SYNC_DEPTH \
            --partial-clone \
            --no-tags \
            --no-clone-bundle \
            2>&1 | tail -5

          echo "=== Syncing source (this may take a while) ==="
          repo sync -c -j$(nproc --all) \
            --force-sync \
            --no-tags \
            --no-clone-bundle \
            --optimized-fetch \
            --prune \
            2>&1 | tail -20

          echo "=== Sync complete ==="
          du -sh ~/twrp
          df -h /

      - name: Clone device tree
        run: |
          cd ~/twrp
          mkdir -p device/xiaomi
          git clone -b $DEVICE_TREE_BRANCH \
            --depth=1 \
            --single-branch \
            $DEVICE_TREE_URL \
            device/xiaomi/$DEVICE

          echo "=== Device tree contents ==="
          ls -la device/xiaomi/$DEVICE/

      - name: Detect release configuration
        run: |
          cd ~/twrp
          echo "=== Detecting available release configurations ==="

          # Check for release configs in build/release_config
          echo "--- build/release_config contents ---"
          ls -la build/release_config/ 2>/dev/null || echo "No build/release_config dir"

          # Check for release configs in vendor
          echo "--- Looking for release configs ---"
          find . -path "*/release_config*" -name "*.textproto" 2>/dev/null | head -20

          # Check available products
          echo "--- Checking envsetup.sh lunch function ---"
          source build/envsetup.sh 2>/dev/null

          # Try to find valid release names
          echo "--- Checking build/make/core/release_config.mk ---"
          cat build/make/core/release_config.mk 2>/dev/null | head -30 || echo "File not found"

          # Check for AP release configs
          echo "--- Looking for AP release configs ---"
          find build/release_config -name "*.textproto" 2>/dev/null | head -20

          # Check vendor/xiaomi for release configs
          echo "--- Checking vendor/xiaomi ---"
          find vendor/xiaomi -name "*release*" -o -name "*config*" 2>/dev/null | head -20

          # Try to list all lunch combos
          echo "--- Attempting to list products ---"
          TWRP_PRODUCT=$(grep -r "PRODUCT_DEVICE\s*:=\s*$DEVICE" device/ 2>/dev/null | head -1 | cut -d: -f1)
          echo "Device tree for $DEVICE: $TWRP_PRODUCT"

          # Find the product name
          if [ -n "$TWRP_PRODUCT" ]; then
            TWRP_DIR=$(dirname "$TWRP_PRODUCT")
            echo "TWRP device dir: $TWRP_DIR"
            cat "$TWRP_DIR/AndroidProducts.mk" 2>/dev/null
          fi

      - name: Build TWRP
        run: |
          cd ~/twrp

          # Set up environment variables
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          export CCACHE_EXEC=$(which ccache)
          export BUILD_USERNAME=runner
          export BUILD_HOSTNAME=github-actions

          # Source build environment
          source build/envsetup.sh 2>/dev/null

          # Try different lunch formats for Android 14+/16
          echo "=== Trying lunch formats ==="

          # Method 1: Try three-part format with common release names
          LUNCH_SUCCESS=false
          for RELEASE in ap3a ap4a ap5a aosp ap2a trunk_staging; do
            echo "Trying: lunch twrp_rothko-${RELEASE}-userdebug"
            if lunch twrp_rothko-${RELEASE}-userdebug 2>&1; then
              echo "=== SUCCESS with release: $RELEASE ==="
              LUNCH_SUCCESS=true
              break
            fi
          done

          # Method 2: If three-part failed, try with TARGET_RELEASE
          if [ "$LUNCH_SUCCESS" = false ]; then
            echo "=== Trying TARGET_RELEASE method ==="
            for RELEASE in ap3a ap4a ap5a aosp; do
              echo "Trying: TARGET_RELEASE=$RELEASE lunch twrp_rothko-userdebug"
              export TARGET_RELEASE=$RELEASE
              if lunch twrp_rothko-userdebug 2>&1; then
                echo "=== SUCCESS with TARGET_RELEASE=$RELEASE ==="
                LUNCH_SUCCESS=true
                break
              fi
            done
          fi

          # Method 3: Try to find available lunch targets
          if [ "$LUNCH_SUCCESS" = false ]; then
            echo "=== Trying to find available targets ==="
            # Check if there's a lunch combo list
            cat vendor/twrp/config/common.mk 2>/dev/null | head -20
            # Try common TWRP patterns
            for TARGET in twrp_rothko omni_rothko; do
              for RELEASE in ap3a ap4a ap5a; do
                echo "Trying: lunch ${TARGET}-${RELEASE}-userdebug"
                if lunch ${TARGET}-${RELEASE}-userdebug 2>&1; then
                  echo "=== SUCCESS ==="
                  LUNCH_SUCCESS=true
                  break 2
                fi
              done
            done
          fi

          if [ "$LUNCH_SUCCESS" = false ]; then
            echo "=== ERROR: Could not find valid lunch target ==="
            echo "Dumping available info:"
            env | grep -i lunch
            env | grep -i target
            exit 1
          fi

          echo "============================================"
          echo "=== Starting TWRP build for $DEVICE ==="
          echo "============================================"
          echo "Time: $(date)"
          echo "Available RAM: $(free -h | head -2)"
          echo "Available disk: $(df -h / | tail -1)"
          echo "============================================"

          # Build - try recoveryimage first, fallback to adbd
          echo "=== Building recoveryimage ==="
          if make recoveryimage -j$(nproc --all) 2>&1 | tail -100; then
            echo "=== recoveryimage build complete ==="
          else
            echo "=== recoveryimage failed, trying adbd ==="
            make adbd -j$(nproc --all) 2>&1 | tail -100
          fi

          echo "============================================"
          echo "=== Build complete ==="
          echo "Time: $(date)"
          echo "============================================"

      - name: Check build output
        if: always()
        run: |
          cd ~/twrp
          echo "=== Looking for build artifacts ==="

          OUT_DIR="out/target/product/$DEVICE"

          if [ -d "$OUT_DIR" ]; then
            echo "Found product directory:"
            ls -la $OUT_DIR/

            echo ""
            echo "=== Recovery images ==="
            find $OUT_DIR -name "recovery.*" -o -name "boot.*" -o -name "vendor_boot.*" 2>/dev/null | head -20

            echo ""
            echo "=== TWRP images ==="
            find $OUT_DIR -name "twrp*" 2>/dev/null | head -20

            echo ""
            echo "=== All IMG files ==="
            find $OUT_DIR -name "*.img" 2>/dev/null | head -20
          else
            echo "Product directory not found at $OUT_DIR"
            echo "Checking out/ directory structure:"
            find out/ -maxdepth 3 -type d 2>/dev/null | head -30
          fi

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twrp-rothko-${{ github.run_number }}
          path: |
            ~/twrp/out/target/product/${{ env.DEVICE }}/*.img
            ~/twrp/out/target/product/${{ env.DEVICE }}/recovery.*
          retention-days: 30
          if-no-files-found: warn

      - name: Build log (on failure)
        if: failure()
        run: |
          echo "=== Build failed, checking logs ==="
          cd ~/twrp
          if [ -f out/error.log ]; then
            echo "=== Error log ==="
            tail -200 out/error.log
          fi
          if [ -f out/verbose.log.gz ]; then
            echo "=== Decompressing verbose log ==="
            zcat out/verbose.log.gz | tail -500
          fi
          echo "=== Last modified files ==="
          find out/ -name "*.log" -mmin -10 2>/dev/null | head -20
          echo "=== Disk usage ==="
          df -h /
          echo "=== Ccache stats ==="
          ccache -s

      - name: Ccache stats
        if: always()
        run: |
          echo "=== Ccache statistics ==="
          ccache -s
