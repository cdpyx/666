name: Build TWRP for Xiaomi 14T Pro (rothko)

on:
  workflow_dispatch:
    inputs:
      twrp_branch:
        description: 'TWRP manifest branch'
        required: false
        default: 'twrp-14.1'
      sync_depth:
        description: 'Shallow clone depth (0 for full)'
        required: false
        default: '1'
      build_target:
        description: 'Build target'
        required: false
        default: 'adbd'
        type: choice
        options:
          - adbd
          - vendorbootimage
          - recoveryimage

env:
  MANIFEST_URL: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  MANIFEST_BRANCH: ${{ github.event.inputs.twrp_branch || 'twrp-14.1' }}
  DEVICE_TREE_URL: https://github.com/JonesqPacMan/android_device_xiaomi_rothko_twrp.git
  DEVICE_TREE_BRANCH: twrp-14.1_a16
  DEVICE: rothko
  SYNC_DEPTH: ${{ github.event.inputs.sync_depth || '1' }}
  BUILD_TARGET: ${{ github.event.inputs.build_target || 'vendorbootimage' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Free up disk space & create swap
        run: |
          echo "=== Before cleanup ==="
          df -h /
          free -h
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules
          sudo apt-get clean

          # Create 16GB swap file for soong_build OOM prevention
          echo "=== Creating 16GB swap file ==="
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== After cleanup + swap ==="
          df -h /
          free -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git git-lfs gnupg \
            gperf imagemagick lib32readline-dev lib32z1-dev \
            libelf-dev liblz4-tool libncurses5 libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
            lz4 pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev libwxgtk3.0-gtk3-dev \
            repo python3 python-is-python3 wget \
            openjdk-17-jdk unzip
          sudo apt-get clean
          echo "=== Disk space after deps ==="
          df -h /

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up ccache
        uses: actions/cache@v4
        with:
          path: ~/twrp
          key: ccache-twrp-rothko-v2-${{ github.run_number }}
          restore-keys: |
            ccache-twrp-rothko-v2-

      - name: Configure ccache
        run: |
          ccache -M 10G
          ccache -o compression=true
          ccache -o compression_level=6
          ccache -z

      - name: Set up repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync TWRP source
        run: |
          mkdir -p ~/twrp
          cd ~/twrp

          echo "=== Initializing repo ==="
          repo init -u $MANIFEST_URL \
            -b $MANIFEST_BRANCH \
            --depth=$SYNC_DEPTH \
            --partial-clone \
            --no-tags \
            --no-clone-bundle \
            2>&1 | tail -5

          echo "=== Syncing source (this may take a while) ==="
          repo sync -c -j$(nproc --all) \
            --force-sync \
            --no-tags \
            --no-clone-bundle \
            --optimized-fetch \
            --prune \
            2>&1 | tail -20

          echo "=== Sync complete ==="
          du -sh ~/twrp
          df -h /

      - name: Clone device tree
        run: |
          cd ~/twrp
          mkdir -p device/xiaomi
          git clone -b $DEVICE_TREE_BRANCH \
            --depth=1 \
            --single-branch \
            $DEVICE_TREE_URL \
            device/xiaomi/$DEVICE

          echo "=== Device tree contents ==="
          ls -la device/xiaomi/$DEVICE/

      - name: Create release configs
        run: |
          cd ~/twrp
          mkdir -p build/release/flag_values
          for REL in ap1a ap2a ap3a ap4a; do
            printf 'value { name: "RELEASE_ACONFIG_VALUE_SETS" value: "" }\nvalue { name: "RELEASE_HIDDEN_API_EXPORTABLE_STUBS" value: "" }\n' > "build/release/flag_values/${REL}.textproto"
            echo "Created: ${REL}.textproto"
          done

      - name: Fix libtar AIDL dependency
        run: |
          cd ~/twrp
          echo "=== Patching libtar to remove missing AIDL deps ==="
          LIBTAR_MK="bootable/recovery/libtar/Android.mk"
          if [ ! -f "$LIBTAR_MK" ]; then echo "ERROR: $LIBTAR_MK not found"; exit 1; fi
          sed -i '/android\.security\.apc-ndk_platform/d' "$LIBTAR_MK"
          sed -i '/android\.system\.keystore2-V1-ndk_platform/d' "$LIBTAR_MK"
          sed -i '/android\.security\.authorization-ndk_platform/d' "$LIBTAR_MK"
          sed -i '/android\.security\.maintenance-ndk_platform/d' "$LIBTAR_MK"
          sed -i '/libgatekeeper_aidl/d' "$LIBTAR_MK"
          echo "=== Done ==="
          grep -c "ndk_platform\|gatekeeper_aidl" "$LIBTAR_MK" && echo "WARNING: some refs remain" || echo "All AIDL refs removed"

      - name: Build TWRP
        run: |
          cd ~/twrp

          # Set up environment
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          export CCACHE_EXEC=$(which ccache)
          export BUILD_USERNAME=runner
          export BUILD_HOSTNAME=github-actions
          export OUT_DIR=out

          # Reduce parallelism to avoid OOM killer on 15GB RAM runner
          CORES=$(nproc --all)
          BUILD_JOBS=2
          echo "Using $BUILD_JOBS parallel jobs (of $CORES cores, limited for stability)"

          # Source build environment
          source build/envsetup.sh 2>/dev/null

          # Find product name from device tree
          PRODUCT_NAME=$(grep -r "PRODUCT_NAME\s*:=\s*" device/xiaomi/$DEVICE/*.mk 2>/dev/null | head -1 | sed 's/.*PRODUCT_NAME\s*:=\s*//' | tr -d ' ')
          echo "Product: $PRODUCT_NAME"

          # Try lunch with correct release name (ap2a confirmed working)
          LUNCH_SUCCESS=false
          for RELEASE in ap2a ap3a ap1a ap4a; do
            echo "Trying: lunch ${PRODUCT_NAME}-${RELEASE}-userdebug"
            if lunch "${PRODUCT_NAME}-${RELEASE}-userdebug" 2>&1; then
              echo "=== SUCCESS with release: $RELEASE ==="
              LUNCH_SUCCESS=true
              break
            fi
          done

          if [ "$LUNCH_SUCCESS" = false ]; then
            echo "ERROR: Could not configure lunch target"
            exit 1
          fi

          echo "============================================"
          echo "=== Starting TWRP build for $DEVICE ==="
          echo "=== Target: $BUILD_TARGET ==="
          echo "============================================"
          echo "Time: $(date)"
          echo "Available RAM: $(free -h | head -2)"
          echo "Available disk: $(df -h / | tail -1)"
          echo "CPU cores: $CORES, using $BUILD_JOBS jobs"
          echo "============================================"

          # Build - log to file, no pipe to avoid SIGTERM propagation
          BUILD_LOG="$HOME/build.log"
          echo "=== Building $BUILD_TARGET (log: $BUILD_LOG) ==="
          echo "Start time: $(date)"

          # Trap SIGTERM to see what's killing us
          trap 'echo "[$(date)] SIGTERM received! Process tree:"; ps auxf; echo "=== dmesg last 20 lines ==="; dmesg 2>/dev/null | tail -20 || true' TERM

          # Run the build with output to file
          make $BUILD_TARGET \
            -j$BUILD_JOBS \
            > $BUILD_LOG 2>&1 &
          BUILD_PID=$!
          echo "Build PID: $BUILD_PID"

          # Wait for build with timeout monitoring
          WAIT_COUNT=0
          while kill -0 $BUILD_PID 2>/dev/null; do
            sleep 30
            WAIT_COUNT=$((WAIT_COUNT + 1))
            if [ $((WAIT_COUNT % 2)) -eq 0 ]; then
              echo "[$(date)] Build running... ($(du -h $BUILD_LOG 2>/dev/null | cut -f1) log, $(free -h | awk '/Mem:/{print $7}' ) RAM free)"
            fi
          done
          wait $BUILD_PID
          BUILD_EXIT=$?

          echo "============================================"
          echo "=== Build finished with exit code: $BUILD_EXIT ==="
          echo "End time: $(date)"
          echo "Build log size: $(du -h $BUILD_LOG 2>/dev/null | cut -f1)"
          echo "============================================"

          # Always show last 100 lines of build log
          echo "=== Last 100 lines of build log ==="
          tail -100 $BUILD_LOG 2>/dev/null

          # Show error details if build failed
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            echo "=== Searching for errors in log ==="
            grep -i "error\|fatal\|failed\|killed\|oom" $BUILD_LOG 2>/dev/null | tail -30
          fi

          exit $BUILD_EXIT

      - name: Check build output
        if: always()
        run: |
          cd /home/runner/twrp
          echo "=== Looking for build artifacts ==="

          OUT_DIR="out/target/product/$DEVICE"

          if [ -d "$OUT_DIR" ]; then
            echo "Found product directory:"
            ls -la $OUT_DIR/

            echo ""
            echo "=== Recovery/vendor_boot images ==="
            find $OUT_DIR -maxdepth 2 \( -name "recovery.*" -o -name "vendor_boot.*" -o -name "boot.*" \) 2>/dev/null

            echo ""
            echo "=== TWRP images ==="
            find $OUT_DIR -maxdepth 2 -name "twrp*" 2>/dev/null

            echo ""
            echo "=== All IMG files ==="
            find $OUT_DIR -maxdepth 2 -name "*.img" 2>/dev/null

            echo ""
            echo "=== INSTALLED files ==="
            find $OUT_DIR -name "installed-files*" 2>/dev/null | head -5
          else
            echo "Product directory not found at $OUT_DIR"
            echo "Checking out/ directory structure:"
            find out/ -maxdepth 4 -type d 2>/dev/null | head -50
          fi

          echo ""
          echo "=== Disk usage ==="
          df -h /

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twrp-rothko-${{ github.run_number }}
          path: |
            /home/runner/twrp/out/target/product/${{ env.DEVICE }}/*.img
            /home/runner/twrp/out/target/product/${{ env.DEVICE }}/recovery.*
            /home/runner/twrp/out/target/product/${{ env.DEVICE }}/vendor_boot.*
          retention-days: 30
          if-no-files-found: warn

      - name: Build log (on failure)
        if: failure()
        run: |
          echo "=== Build failed, checking logs ==="
          cd /home/runner/twrp
          if [ -f out/error.log ]; then
            echo "=== Error log ==="
            tail -200 out/error.log
          fi
          if [ -f out/verbose.log.gz ]; then
            echo "=== Decompressing verbose log ==="
            zcat out/verbose.log.gz | tail -500
          fi
          echo "=== Last modified files ==="
          find out/ -name "*.log" -mmin -10 2>/dev/null | head -20
          echo "=== Disk usage ==="
          df -h /
          echo "=== Ccache stats ==="
          ccache -s

      - name: Ccache stats
        if: always()
        run: |
          echo "=== Ccache statistics ==="
          ccache -s
